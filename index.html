<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BuildMyMeal</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<nav class="navbar">
  <h2 class="heading">Build Your Meal 🍽️</h2>
  <p>🛒 Cart: <span id="cartCount">0</span></p>
</nav>
<main>
<div id="categories" class="categories">

  <div onclick="selectCategory('pizza')" class="catCard">
    <img src="https://cdn.pixabay.com/photo/2017/12/09/08/18/pizza-3007395_1280.jpg">
    <p>Pizza</p>
  </div>

  <div onclick="selectCategory('pasta')" class="catCard">
    <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?q=80&w=800">
    <p>Pasta</p>
  </div>

  <div onclick="selectCategory('burger')" class="catCard">
    <img src="https://cdn.pixabay.com/photo/2014/10/23/18/05/burger-500054_1280.jpg">
    <p>Burger</p>
  </div>

  <div onclick="selectCategory('drink')" class="catCard">
    <img src="https://cdn.pixabay.com/photo/2017/01/20/15/06/orange-juice-1995056_1280.jpg">
    <p>Drinks</p>
  </div>

</div>

<div id="builder"></div>

</main>

<script src="script.js"></script>
</body>
</html>
